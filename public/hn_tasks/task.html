<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Oppgaver</title>

<style>
:root {
  --hn-primary: #1f2f3a;
  --hn-accent: #2bbf9c;
  --hn-accent-dark: #239e82;
  --hn-bg: #f5f7f8;
  --hn-text: #1f2f3a;
  --hn-error: #e74c3c;
}

body {
  font-family: system-ui, sans-serif;
  margin: 0;
  background: var(--hn-bg);
}

/* HEADER */
header {
  background: var(--hn-primary);
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
}

header img {
  height: 40px;
  margin-right: 12px;
}

/* CONTAINER */
.container {
  max-width: 700px;
  margin: 40px auto;
  padding: 0 20px;
}

/* OPPGAVE */
.question {
  font-size: 18px;
  margin-bottom: 22px;
  line-height: 2;
}

/* INPUT */
.inline-input {
  width: 80px;
  border: none;
  border-bottom: 2px solid var(--hn-accent);
  background: transparent;
  text-align: center;
  font-size: 16px;
}

.inline-input:focus {
  outline: none;
  border-bottom: 2px solid var(--hn-primary);
}

/* BUTTONS */
.controls {
  text-align: center;
}

button {
  margin: 10px;
  padding: 10px 24px;
  background: var(--hn-accent);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: var(--hn-accent-dark);
}

/* FEEDBACK */
.correct { color: green; margin-left:10px; }
.wrong { color: var(--hn-error); margin-left:10px; }

</style>
</head>

<body>

<header>
  <img src="/assets/img/logo_transparent.png">
  <h2>Oppgaver</h2>
</header>

<div class="container" id="app"></div>

<div class="controls">
  <button onclick="checkAnswers()">Sjekk svar</button>
  <button onclick="loadNew()">Nye oppgaver</button>
</div>

<div id="footer"></div>

<script>
const params = new URLSearchParams(location.search);
const level = params.get('level') || 'a1';

let tasks = [];

// LOAD
function fetchTasks() {
  fetch(`/hn_tasks/api/tasks.php?level=${level}`)
  .then(r => r.json())
  .then(data => {
    tasks = data;
    render();
  });
}

// RENDER
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  tasks.forEach((t, i) => {

    const html = t.q.replace(
      /___/g,
      `<input class="inline-input" id="input${i}">`
    );

    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = html + ` <span id="fb${i}"></span>`;

    app.appendChild(div);
  });
}

// CHECK
function checkAnswers() {
  tasks.forEach((t, i) => {

    const input = document.getElementById(`input${i}`);
    const fb = document.getElementById(`fb${i}`);

    const val = input.value.trim().toLowerCase();
    const correct = t.correct.toLowerCase();

    if (val === correct) {
      fb.innerHTML = '✔';
      fb.className = 'correct';
    } else {
      fb.innerHTML = `✖ (${t.correct})`;
      fb.className = 'wrong';
    }
  });
}

// NEW
function loadNew() {
  fetchTasks();
}

// INIT
fetchTasks();

// FOOTER (FIXED)
fetch('/hn_core/footer.php')
.then(r => r.text())
.then(html => {
  document.getElementById('footer').innerHTML = html;
});
</script>

</body>
</html>
